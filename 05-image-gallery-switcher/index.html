<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery Switcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Image Gallery Switcher</h1>
      <div class="main" id="main-img-container">
        <img src="./assets/luffy.jpg" alt="luffy-image" id="main-img" />
      </div>
      <div class="thumbnails">
        <img src="./assets/luffy.jpg" alt="luffy-image" class="active" />
        <img src="./assets/bleach.jpg" alt="bleach-image" />
        <img src="./assets/ichigo.jpg" alt="ichigo-image" />
        <img src="./assets/eren.jpg" alt="eren-image" />
        <img src="./assets/one-piece.jpg" alt="one-piece-image" />
      </div>
      <div class="btn-container">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
